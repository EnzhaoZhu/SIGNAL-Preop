project:
  name: SIGNAL-Preop
  description: >
    Reproducibility template for structured QA preprocessing,
    Longformer-based multitask training, and inference using synthetic data.

data:
  # Preprocessed input generated by src/preprocess.py.
  train_input: outputs/toy_input_text.csv
  train_labels: examples/toy_labels.csv

  # Inference input should contain: participant_id,input_text.
  inference_input: outputs/toy_input_text.csv

questionnaire:
  schema_path: questionnaire/questionnaire_schema.json

model:
  # Recommended for offline use:
  # base_model_name_or_path: models/longformer-base-4096
  #
  # Online HuggingFace model name:
  base_model_name_or_path: schen/longformer-chinese-base-4096

  # If null, tokenizer path defaults to base_model_name_or_path.
  tokenizer_name_or_path: null

  max_length: 2048
  dropout: 0.1

  tasks:
    - DD
    - GAD
    - IND
    - SR

training:
  output_dir: outputs/checkpoints
  batch_size: 2
  learning_rate: 0.00002
  weight_decay: 0.01
  num_epochs: 2
  warmup_ratio: 0.1
  val_fraction: 0.2
  focal_alpha: 0.25
  focal_gamma: 2.0
  use_uncertainty_weighting: true
  freeze_encoder: false
  gradient_checkpointing: false
  gradient_clip_norm: 1.0

inference:
  checkpoint_dir: outputs/checkpoints
  checkpoint_path: null
  output_path: outputs/toy_predictions.csv
  batch_size: 2
  threshold: 0.5

runtime:
  seed: 42

  # Options: null, cpu, cuda.
  device: null

  # Optional local HuggingFace cache directory.
  hf_cache_dir: null